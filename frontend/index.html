<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Workout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>AI Workout Generator</h1>

    <form id="workout-form">
      <input type="text" id="goal" placeholder="Your goal (e.g., Build Muscle)" required>
      <input type="number" id="days" placeholder="Days per week (1-7)" min="1" max="7" required>
      <input type="number" id="weight" placeholder="Weight (kg)" min="30" max="300">
      <input type="number" id="height" placeholder="Height (cm)" min="100" max="250">

      <select id="difficulty" required>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate" selected>Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>

      <button type="submit">Generate Workout</button>
    </form>

    <div id="response">Your workout plan will appear here...</div>
  </div>

  <script>
    const form = document.getElementById('workout-form');
    const responseDiv = document.getElementById('response');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const goal = document.getElementById('goal').value;
      const days = parseInt(document.getElementById('days').value);
      const weight = parseFloat(document.getElementById('weight').value) || undefined;
      const height = parseFloat(document.getElementById('height').value) || undefined;
      const difficulty = document.getElementById('difficulty').value;

      responseDiv.textContent = "Generating workout...";
      responseDiv.classList.add('loading');

      try {
        const res = await fetch('http://127.0.0.1:5005/generate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            goal: goal,
            days_per_week: days,
            weight_kg: weight,
            height_cm: height,
            difficulty: difficulty
          })
        });

        const data = await res.json();
        responseDiv.textContent = data.workout_plan;
        // Scroll to top so user sees start of plan
        responseDiv.scrollTop = 0;
      } catch (err) {
        responseDiv.textContent = "Error generating workout: " + err;
      } finally {
        responseDiv.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
